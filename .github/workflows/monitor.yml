name: Monitor Empleo Público

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  monitorizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Restaurar estado anterior
        uses: actions/cache@v4
        with:
          path: estado_webs.json
          key: estado-webs-${{ github.run_id }}
          restore-keys: |
            estado-webs-

      - name: Ejecutar monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_empleo.py

      - name: Publicar historial en GitHub Pages
        run: |
          git config user.name "Monitor Bot"
          git config user.email "monitor@github-actions"
          git add historial.json
          git diff --staged --quiet || git commit -m "📊 Actualizar historial $(date +'%d/%m/%Y %H:%M')"
          git push

      - name: Guardar log como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ github.run_number }}
          path: monitor_empleo.log
          retention-days: 7
